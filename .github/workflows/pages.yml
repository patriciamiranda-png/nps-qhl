name: Deploy NPS Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          mkdir /tmp/site
          cp index.html data.json .nojekyll /tmp/site/

          cd /tmp/site
          git init
          git add .
          git commit -m "deploy: NPS dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/patriciamiranda-png/nps-qhl.git" HEAD:gh-pages --force
